services:
  cake-admin:
    build: .
    container_name: cake-admin
    restart: always
    ports:
      - "3001:3000"
    environment:
      - NUXT_API_BASE=http://host.docker.internal:5001/api # Internal (for SSR)
      - NUXT_PUBLIC_API_BASE=http://localhost:5001/api # External (for Browser)
      - NODE_ENV=production
